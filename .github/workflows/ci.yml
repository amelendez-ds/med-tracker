name: CI

# Runs on every push and to any branch and every PR
on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2 # Install uv. check for a newer tag; setup-uv no longer ships a moving @v8
        with: 
          enable-cache: true # caches the uv package to store between runs
      
      - name: Install dependencies (from lockfile)
        run: uv sync --locked --all-extras --dev # lock requires lockfile to be updated

      - name: Lint (ruff)
        run: uv run ruff check .
      
      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src tests

      - name: Tests (pytest)
        run: uv run pytest
